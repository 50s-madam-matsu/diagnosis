<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運命の熟女診断</title>
<style>
html, body { height: auto; min-height: 100%; overflow-x: hidden; overflow-y: auto; margin: 0; padding: 0; }
body { font-family: 'Hiragino Mincho ProN', serif; background: #fff8f8; color: #555; padding-bottom: 50px; }
.card { max-width: 500px; margin: 15px auto; padding: 20px; background: rgba(255, 255, 255, 0.96); border-radius: 20px; border: 2px solid #f8bbd0; box-shadow: 0 10px 30px rgba(248, 187, 208, 0.3); box-sizing: border-box; }
.progress { height:8px; background:#f0f0f0; border-radius:10px; margin-bottom:25px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(to right, #ffb1c1, #ff5c8a); width:0%; transition: 0.5s; }
.question { font-size:1.2em; font-weight:bold; margin-bottom:20px; color:#d81b60; text-align: center; }
.btn { display:block; width:90%; margin: 10px auto; padding: 14px 5px; font-size:15px; border:none; border-radius:50px; background: linear-gradient(180deg, #f9e1a9, #e6c986); color:#5d4037; font-weight:bold; cursor:pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: 0.3s; text-decoration: none; text-align: center; box-sizing: border-box; }
.btn-sub { background: #fff !important; border: 2px solid #f8bbd0 !important; color: #d81b60 !important; box-shadow: none !important; padding: 10px 5px !important; font-size: 14px !important; }
.check-item { display: block; width: 90%; margin: 8px auto; padding: 12px; background:#fff; border-radius:12px; border:1px solid #f8bbd0; cursor:pointer; font-size: 15px; text-align: center; }
.check-item input { display:none; }
.check-item.selected { background:#ffebf0; border-color:#ff5c8a; color:#d81b60; font-weight:bold; }
.result-card { background:#fff; border-radius:15px; padding:15px; margin:15px 0; border: 1px solid #fce4ec; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
.cast-img { width:100%; max-width:200px; border-radius:15px; margin-bottom:12px; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); pointer-events: none; }
.rank-badge { display:inline-block; padding:4px 15px; background:#d4af37; color:#fff; border-radius:20px; font-size:0.9em; margin-bottom:10px; font-weight: bold; }
.hidden { display:none !important; }
img { -webkit-touch-callout: none; user-select: none; }
#title-page { text-align: center; padding: 20px 0; }
.main-title { font-size: 1.8em; color: #d81b60; margin-bottom: 10px; font-weight: bold; }
.sub-title { font-size: 0.9em; color: #888; margin-bottom: 25px; line-height: 1.6; }
.no-match { text-align: center; padding: 15px 10px; color: #d81b60; font-weight: bold; }
.pickup-title { font-size: 0.95em; color: #d81b60; border-bottom: 1px solid #f8bbd0; padding-bottom: 5px; margin-top: 25px; text-align: center; font-weight: bold; }
.title-logo { width: 100%; max-width: 380px; height: auto; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="card">
    <div id="title-page">
        <img src="logo.png" class="title-logo" alt="運命の熟女診断" onerror="this.style.display='none'; document.getElementById('text-title').style.display='block';">
        <h1 id="text-title" class="main-title" style="display:none;">運命の熟女診断</h1>
        
        <p class="sub-title">今のあなたの気分に合わせて<br>ピッタリなマダムをご提案します</p>
        <button class="btn" onclick="startQuiz()">診断をはじめる</button>
    </div>
    <div id="quiz-area" class="hidden">
        <div class="progress"><div id="bar" class="progress-bar"></div></div>
        <div id="quiz"></div>
    </div>
    <div id="result" class="hidden"></div>
</div>

<script>
const castData = [
    { name: "荒井美保さん", realAge: "43", ageGroup: "40代", height: "普通", cup: "普通", style: "スレンダー", type: "癒し系", play: "イチャイチャ", lead: "こだわらない", spec: "T158 ・ 86 (C) ・ 60 ・ 87", memo: "人懐っこい性格でイチャイチャ好きの美保さん♪お洒落なファッションセンスも抜群に輝き、男性を虜にする存在そのものに違いありません。", img: "arai01.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2023120213360884867634478" },
    { name: "石田美希さん", realAge: "57", ageGroup: "50代", height: "長身", cup: "大きめ", style: "ぽっちゃり", type: "色気系", play: "エロ重視", lead: "こだわらない", spec: "T164 ・ 103 (G) ・ 76 ・ 97", memo: "フレンドリーな笑顔が周りを明るくし、テクニシャンとしての繊細なサービスが心を溶かすような雰囲気を作り出します。", img: "ishida04.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2016030811380645706121902" },
    { name: "大久保美香さん", realAge: "45", ageGroup: "40代", height: "小柄", cup: "大きめ", style: "ぽっちゃり", type: "癒し系", play: "イチャイチャ", lead: "こだわらない", spec: "T152 ・ 114 (H) ・ 109 ・ 113", memo: "その癒しオーラは一緒にいるだけで心が溶けそうになり、甘えん坊でイチャイチャが大好きな男性を虜にせずにはいられないでしょう。", img: "ookubo08.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2021053119565921312048382" },
    { name: "尾崎幸子さん", realAge: "49", ageGroup: "40代", height: "小柄", cup: "小さめ", style: "スレンダー", type: "清楚系", play: "イチャイチャ", lead: "こだわらない", spec: "T153 ・ 76 (A) ・ 59 ・ 82", memo: "美脚が視線を釘付けにし、素晴らしい笑顔で心を溶かします。癒しの包容力が、まるで優しい恋人のように寄り添うのです。", img: "ozaki01a.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2024100111421048226414998" },
    { name: "川上菜々子さん", realAge: "51", ageGroup: "50代", height: "長身", cup: "普通", style: "普通", type: "癒し系", play: "イチャイチャ", lead: "リードしたい", spec: "T165 ・ 90 (D) ・ 66 ・ 91", memo: "さらに菜々子さんのテクニシャンとしての腕前は、愛嬌たっぷりなサービスで夢心地に導いてくれます。", img: "kawakami03.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2021113014394055727731935" },
    { name: "田中奈美さん", realAge: "50", ageGroup: "50代", height: "小柄", cup: "大きめ", style: "スレンダー", type: "色気系", play: "エロ重視", lead: "こだわらない", spec: "T150 ・ 82 (E) ・ 59 ・ 87", memo: "ロングヘアーが優雅に揺れるたび熟体がエロく輝きを増し、まるで女神のような艶やかな雰囲気を醸し出します。", img: "tanaka06.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2025011819141344898010299" },
    { name: "新田多香子さん", realAge: "47", ageGroup: "40代", height: "長身", cup: "大きめ", style: "ぽっちゃり", type: "素人系", play: "イチャイチャ", lead: "リードしたい", spec: "T167 ・ 124 (J) ・ 99 ・ 123", memo: "グラマラスなJカップのボディは柔らか質感が魅惑的です。明るい人柄が笑顔をさらに可愛く引き立て、虜になること間違いなしでしょう。", img: "nitta02.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2025090214081027548216202" },
    { name: "平野あかりさん", realAge: "44", ageGroup: "40代", height: "長身", cup: "普通", style: "普通", type: "癒し系", play: "イチャイチャ", lead: "リードしたい", spec: "T163 ・ 85 (C) ・ 67 ・ 84", memo: "おっとりとした雰囲気の中に恥ずかしがり屋な一面が覗き、受け身好きの性格が男性の心をくすぐります。さらに内なるド淫乱な一面も魅力。", img: "hirano09.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2024071911321983097448281" },
    { name: "藤村莉奈さん", realAge: "43", ageGroup: "40代", height: "長身", cup: "大きめ", style: "ぽっちゃり", type: "癒し系", play: "イチャイチャ", lead: "リードしたい", spec: "T163 ・ 102 (E) ・ 96 ・ 113", memo: "優しくそっと寄り添うかのように、穏やかな幸福感を与えてくれます。好奇心旺盛な一面も持ち合わせ、会話が弾むこと間違いなしでしょう。", img: "fujimura08.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2023091712053644674936199" },
    { name: "堀田瞳さん", realAge: "58", ageGroup: "50代", height: "普通", cup: "普通", style: "普通", type: "癒し系", play: "イチャイチャ", lead: "こだわらない", spec: "T155 ・ 89 (D) ・ 73 ・ 89", memo: "おっとりとした性格が初々しい魅力を引き立てます。敏感体質な彼女と、新しい発見を楽しみませんか？", img: "hotta02.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2025070219112574252014042" },
    { name: "前田直子さん", realAge: "40", ageGroup: "40代", height: "小柄", cup: "大きめ", style: "ぽっちゃり", type: "癒し系", play: "イチャイチャ", lead: "リードしたい", spec: "T153 ・ 100 (E) ・ 88 ・ 95", memo: "直子さんの柔らかな肌と女性らしい曲線美が視線を釘付けにし、触れるだけでとろとろと溶けそうな感覚を味わえます。", img: "maeda06.jpg", profile: "https://xn--vus92eq8nn9j.com/?DOC=lady_prof&GID=2025031911414970219017775" }
];

const questions = [
    { key:"style", text:"Q1. 好みの体型は？", options:["スレンダー","普通","ぽっちゃり"]},
    { key:"type", text:"Q2. どちらのタイプに惹かれますか？", options:["清楚系", "色気系", "素人系", "癒し系", "おっとり系"]},
    { key:"play", text:"Q3. どちらが好みですか？", options:["イチャイチャ","エロ重視"]},
    { key:"lead", text:"Q4. プレイ中の雰囲気は？", options:["僕がリードしたい", "マダムにリードされたい", "こだわらない"]},
    { key:"multi", text:"Q5. こだわり条件（複数選択OK）", 
      options:[{label:"【年齢】 40代", val:"40代"}, {label:"【年齢】 50代", val:"50代"}, {label:"【年齢】 60代", val:"60代"}, {label:"【身長】 小柄", val:"小柄"}, {label:"【身長】 長身", val:"長身"}, {label:"【胸】 小さめ", val:"小さめ"}, {label:"【胸】 普通", val:"普通"}, {label:"【胸】 大きめ", val:"大きめ"}], multi:true }
];

let step=0;
let answers={multi:[]};

function startQuiz() {
    document.getElementById("title-page").classList.add("hidden");
    document.getElementById("quiz-area").classList.remove("hidden");
    render();
}

function render(){
    updateProgress();
    let q = questions[step];
    if(!q) return;
    let html = `<div class="question">${q.text}</div>`;
    if(q.multi){
        q.options.forEach(o => {
            html += `<label class="check-item" id="label-${o.val}"><input type="checkbox" value="${o.val}" onchange="toggleLabel('${o.val}')">${o.label}</label>`;
        });
        html += `<button class="btn" style="margin-top:20px;" onclick="saveMulti()">診断結果を見る</button>`;
    } else {
        q.options.forEach(o => {
            let val = o;
            if(o === "僕がリードしたい") val = "リードしたい";
            if(o === "マダムにリードされたい") val = "リードされたい";
            html += `<button class="btn" onclick="save('${q.key}','${val}')">${o}</button>`;
        });
    }
    document.getElementById("quiz").innerHTML = html;
    window.scrollTo(0, 0);
}

function toggleLabel(val){ document.getElementById('label-'+val).classList.toggle('selected'); }
function save(key,val){ answers[key]=val; step++; render(); }
function saveMulti(){ document.querySelectorAll("input:checked").forEach(el => answers.multi.push(el.value)); showResult(); }
function updateProgress(){ document.getElementById("bar").style.width = (step / questions.length) * 100 + "%"; }

function getScore(c){
    let s=0;
    if(answers.type===c.type) s+=5;
    if(answers.play===c.play) s+=10;
    if(answers.lead===c.lead || c.lead==="こだわらない" || answers.lead==="こだわらない") s+=5;
    return s;
}

function showResult(){
    let filtered = castData.filter(c => {
        if (c.style !== answers.style) return false;
        let multi = answers.multi;
        let selectedAges = multi.filter(m => m.includes("代"));
        if (selectedAges.length > 0 && !selectedAges.includes(c.ageGroup)) return false;
        let selectedHeights = multi.filter(m => ["小柄", "長身"].includes(m));
        if (selectedHeights.length > 0 && !selectedHeights.includes(c.height)) return false;
        let selectedCups = multi.filter(m => ["小さめ", "普通", "大きめ"].includes(m));
        if (selectedCups.length > 0 && !selectedCups.includes(c.cup)) return false;
        return true;
    });

    let html = "";
    if (filtered.length === 0) {
        html = `<div class="no-match">
            <p>条件に完璧に一致するマダムは<br>現在お出かけ中のようです…</p>
            <p style="font-size: 0.8em; color: #888; margin-top:8px; font-weight:normal;">「正直な診断」をモットーにしております！</p>
        </div>`;
    } else {
        let sorted = filtered.map(c => ({...c, score:getScore(c)})).sort((a,b) => b.score - a.score);
        html = `<h2 style="color:#d81b60; text-align:center; font-size:1.3em;">相性の良いマダムTOP3</h2>`;
        
        sorted.slice(0, 3).forEach((c, i) => {
            const isFirst = i === 0;
            html += `<div class="result-card" style="text-align:center; ${!isFirst ? 'padding:10px; margin:10px 0;' : ''}">
                <div class="rank-badge" style="${!isFirst ? 'background:#b0bec5; font-size:0.8em;' : ''}">${i+1}位：相性 ${Math.min(99, 90 + c.score)}%</div><br>
                <img src="${c.img}" class="cast-img" style="${!isFirst ? 'max-width:160px;' : ''}" onerror="this.src='https://via.placeholder.com/250x350?text=Photo'">
                <div style="font-size:${isFirst ? '1.2em' : '1.1em'}; font-weight:bold; color:#e91e63; margin-bottom:5px;">${c.name}</div>
                <p style="font-size:0.85em; font-weight:bold; margin:3px 0; color:#444;">${c.spec}</p>
                <p style="font-size:0.8em; margin:3px 0; color:#666;">${c.realAge}歳 / ${c.style} / ${c.type}</p>
                ${isFirst ? `<p style="font-size:0.8em; color:#777; margin:10px 0; line-height:1.5; padding:0 5px; text-align:left;">${c.memo}</p>` : ''}
                <a href="${c.profile}" target="_blank" class="btn btn-sub" style="width:85%; padding:8px !important; font-size:13px !important; margin-top:10px;">プロフィール詳細</a>
            </div>`;
        });
    }

    let pickup = castData[Math.floor(Math.random() * castData.length)];
    html += `<div class="pickup-title">＼ こちらのマダムもおすすめ ／</div>
        <div class="result-card" style="text-align:center; background: #fffcfc; padding: 10px;">
            <img src="${pickup.img}" class="cast-img" style="max-width:130px; margin-bottom:8px;" onerror="this.src='https://via.placeholder.com/250x350?text=Photo'">
            <div style="font-weight:bold; color:#e91e63; font-size:1em; margin-bottom:8px;">${pickup.name}</div>
            <a href="${pickup.profile}" target="_blank" class="btn btn-sub" style="width:80%; padding:8px !important; font-size:13px !important;">プロフィールを見る</a>
        </div>`;
    
    html += `<a href="https://xn--vus92eq8nn9j.com/" target="_blank" class="btn" style="background: linear-gradient(180deg, #ffb1c1, #ff8da1); color:#fff; margin-top:15px; font-size:14px;">オフィシャルサイトで探す</a>`;
    html += `<button class="btn btn-sub" style="margin-top:10px;" onclick="location.reload()">もう一度診断する</button>`;

    document.getElementById("quiz-area").classList.add("hidden");
    const resArea = document.getElementById("result");
    resArea.classList.remove("hidden");
    resArea.innerHTML = html;
    window.scrollTo(0, 0); 
}

document.addEventListener('contextmenu', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); }, false);
document.addEventListener('dragstart', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); }, false);
</script>
</body>
</html>
